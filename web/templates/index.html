{{template "base" .}}
{{define "title"}}Poleia — Enter the Sea{{end}}
{{define "content"}}
<div class="auth-page">
  <div class="auth-hero">
    <h1>ΘΑΛΑΣΣΑ</h1>
    <p class="tagline">A Bronze Age world of provinces, kingdoms, and capricious gods.</p>
  </div>

  <div class="auth-forms">
    <div class="tabs" id="auth-tabs">
      <button class="tab active" onclick="showTab('login')">Sign In</button>
      <button class="tab" onclick="showTab('register')">New Player</button>
    </div>

    <div id="tab-login">
      <form id="login-form">
        <div class="field">
          <label>Username or email</label>
          <input type="text" id="login-ident" required autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-pass" required autocomplete="current-password">
        </div>
        <div id="login-error" class="form-error"></div>
        <button type="submit" class="btn-primary">Enter</button>
      </form>
    </div>

    <div id="tab-register" style="display:none">
      <form id="register-form">
        <div class="field">
          <label>Username</label>
          <input type="text" id="reg-username" required minlength="3" maxlength="24" autocomplete="username">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" required autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="reg-pass" required minlength="8" autocomplete="new-password">
        </div>
        <div id="reg-error" class="form-error"></div>
        <button type="submit" class="btn-primary">Claim your seat</button>
      </form>
    </div>
  </div>
</div>

<script>
function showTab(name) {
  document.getElementById('tab-login').style.display = name === 'login' ? '' : 'none';
  document.getElementById('tab-register').style.display = name === 'register' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === (name === 'login'));
  });
}

async function doAuth(url, body, errorEl) {
  errorEl.textContent = '';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || 'Something went wrong.';
      return;
    }
    // Server already set the poleia_token cookie.
    // Also keep tokens in localStorage for HTMX API calls.
    localStorage.setItem('poleia_token', data.access_token);
    localStorage.setItem('poleia_refresh', data.refresh_token);
    window.location.href = '/play';
  } catch (e) {
    errorEl.textContent = 'Network error.';
  }
}

document.getElementById('login-form').addEventListener('submit', e => {
  e.preventDefault();
  doAuth('/api/v1/auth/login', {
    username_or_email: document.getElementById('login-ident').value,
    password: document.getElementById('login-pass').value,
  }, document.getElementById('login-error'));
});

document.getElementById('register-form').addEventListener('submit', e => {
  e.preventDefault();
  doAuth('/api/v1/auth/register', {
    username: document.getElementById('reg-username').value,
    email: document.getElementById('reg-email').value,
    password: document.getElementById('reg-pass').value,
  }, document.getElementById('reg-error'));
});
</script>
{{end}}
