{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}Poleia{{end}}</title>
  <link rel="stylesheet" href="/static/poleia.css">
  <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
  <script>
    // Inject JWT from localStorage on every HTMX request.
    document.addEventListener('htmx:configRequest', function(e) {
      const token = localStorage.getItem('poleia_token');
      if (token) e.detail.headers['Authorization'] = 'Bearer ' + token;
    });

    // Silver weight display: shekel / mina / talang
    // 1 mina = 60 shekel · 1 talang = 60 mina (= 3600 shekel)
    function fmtSilver(v) {
      v = Math.round(v);
      if (v === 0) return '0 shekel';
      if (v < 60)  return v + ' shekel';
      if (v < 3600) {
        const mina = Math.floor(v / 60), shekel = v % 60;
        return shekel ? mina + ' mina ' + shekel + ' shekel' : mina + ' mina';
      }
      const talang = Math.floor(v / 3600), rest = v % 3600;
      const mina   = Math.floor(rest / 60);
      return mina ? talang + ' talang ' + mina + ' mina' : talang + ' talang';
    }
  </script>
</head>
<body>
  <nav class="topbar">
    <a href="/" class="logo">ΘΑΛΑΣΣΑ</a>
    <div class="nav-links">
      {{block "nav" .}}{{end}}
    </div>
  </nav>
  <main>
    {{block "content" .}}{{end}}
  </main>
  <footer>
    <span>Poleia — Bronze Age strategy</span>
  </footer>
</body>
</html>{{end}}
