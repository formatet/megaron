{{template "base" .}}
{{define "title"}}Poleia — Awaiting Province{{end}}
{{define "content"}}
<div class="dispossessed-page">
  <h2>You have no province in this world</h2>
  <p>You are dispossessed or have not yet joined this world.</p>
  <div style="display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap">
    <button class="btn-primary" onclick="joinWorld()">Join World</button>
    <a href="/worlds" class="btn-secondary">Back to Worlds</a>
  </div>
  <div id="join-result" style="margin-top:.6rem;font-family:var(--mono);font-size:.82rem;color:var(--accent)"></div>
</div>
<script>
async function joinWorld() {
  const token = localStorage.getItem('poleia_token');
  const res = await fetch('/api/v1/worlds/{{.WorldID}}/join', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(token ? {'Authorization': 'Bearer ' + token} : {}),
    },
  });
  if (res.ok) {
    window.location.href = '/world/{{.WorldID}}';
  } else {
    const d = await res.json().catch(() => ({}));
    document.getElementById('join-result').textContent = d.error || 'Could not join world.';
  }
}
</script>
{{end}}
